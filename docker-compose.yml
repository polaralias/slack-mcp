services:
  slack-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./state/slack-cache:/root/.cache/slack-mcp-server
    env_file:
      - .env
    environment:
      MCP_HOST: 0.0.0.0
      MCP_PORT: "${SLACK_MCP_PORT:-3005}"
      MCP_PATH: "${SLACK_MCP_PATH:-/mcp}"
      SLACK_MCP_BACKEND_MODE: "${SLACK_MCP_BACKEND_MODE:-binary}"
    ports:
      - "${SLACK_MCP_HOST_PORT:-3005}:${SLACK_MCP_PORT:-3005}"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${SLACK_MCP_PORT:-3005}/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

networks:
  default:
    name: reverse_proxy
    external: true
